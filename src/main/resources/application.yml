spring:
  application:
    name: foodorder-api
  datasource:
    url: jdbc:postgresql://localhost:5432/foodorder
    username: ${DB_USERNAME:foodorder}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

# ── Actuator & Micrometer ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized   # full details for ADMIN, UP/DOWN for public
      probes:
        enabled: true                  # /actuator/health/liveness, /readiness
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true

  # Tag every metric with the application name
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true       # histogram buckets for latency SLOs
      percentiles:
        http.server.requests: 0.5,0.95,0.99

  # Build info is picked up automatically when spring-boot-maven-plugin
  # is configured with <goal>build-info</goal>
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# ── Custom info properties (exposed via /actuator/info) ───────────────────────
info:
  application:
    name: Food Order API
    version: "@project.version@"        # replaced by Maven resource filtering
    description: Multi-vendor food ordering platform
  environment:
    name: ${APP_ENV:local}

# ── JWT / Security ────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
    expiration-ms: 86400000