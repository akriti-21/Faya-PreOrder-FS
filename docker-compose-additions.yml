# ═══════════════════════════════════════════════════════════════════════════════
# Day 10 docker-compose additions
# Merge the redis service and updated app service into your existing
# docker-compose.yml.  Do NOT replace the entire file.
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: foodorder-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodorder-net

  # ── Application (merge environment additions into existing service) ────────
  app:
    # ... keep all existing app service config ...
    environment:
      # Add these to your existing environment block:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      SPRING_PROFILES_ACTIVE: production
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:

networks:
  foodorder-net:
    driver: bridge