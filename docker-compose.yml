# =============================================================================
# docker-compose.yml — production-parity service definition
#
# This file defines the canonical service configuration.
# It does NOT bind host ports or mount source code — those are development
# concerns handled by docker-compose.override.yml, which Docker Compose
# automatically merges when present.
#
# Usage
# ─────
#   make up               Start all services (uses override automatically)
#   make up-prod          Start without override (production-parity)
#   make down             Stop and remove containers + networks
#   make logs             Tail all service logs
#
# Secrets
# ───────
#   All secrets come from the .env file (never committed to git).
#   Copy .env.example → .env and fill in real values.
#   ${VAR:?message} syntax: Docker Compose aborts with the message if VAR
#   is unset or empty — prevents silent misconfiguration.
# =============================================================================

services:

  # ===========================================================================
  # postgres — PostgreSQL 16
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: foodorder-postgres
    restart: unless-stopped

    environment:
      # Database name created on first container start.
      POSTGRES_DB:       ${POSTGRES_DB:-foodorder}

      # Credentials — required, no defaults for security.
      POSTGRES_USER:     ${DB_USERNAME:?DB_USERNAME must be set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}

      # scram-sha-256 is the most secure pg_hba auth method.
      # MD5 is deprecated; reject is too strict for application use.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256

      # Separate the pg data directory from the mount root.
      # Prevents volume initialisation errors on non-empty volume mounts.
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - backend-net

    # No host port binding here — use docker-compose.override.yml to expose
    # 5432 on localhost for DB GUI tools (pgAdmin, DBeaver, DataGrip) in dev.

    healthcheck:
      # pg_isready: lightweight built-in tool; tests TCP + auth without a query.
      # -U and -d must match POSTGRES_USER and POSTGRES_DB above.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB:-foodorder}"]
      interval:     10s   # Check every 10 s
      timeout:       5s   # Fail if no response in 5 s
      retries:        5   # Mark unhealthy after 5 consecutive failures
      start_period:  10s  # Wait 10 s before first check (postgres init time)

    deploy:
      resources:
        limits:
          cpus:   "${POSTGRES_CPU_LIMIT:-1.0}"
          memory: "${POSTGRES_MEM_LIMIT:-512m}"

  # ===========================================================================
  # app — Spring Boot backend
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Build only the runtime stage — the final, minimal JRE image.
      # Remove `target: runtime` to build all stages (useful for debugging).
      target: runtime
      args:
        # Inject git SHA and build date into OCI image labels at build time.
        # These are informational only — they do not affect runtime behaviour.
        GIT_SHA:    ${GIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}

    container_name: foodorder-app
    restart: unless-stopped

    environment:
      # ── Spring profile ───────────────────────────────────────────────────────
      # 'prod' by default. Override to 'dev' in docker-compose.override.yml.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # ── Database ─────────────────────────────────────────────────────────────
      # Service name 'postgres' resolves to the postgres container's IP
      # via Docker's internal DNS — no hardcoded IP addresses.
      DB_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-foodorder}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME must be set in .env}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}

      # ── Connection pool ───────────────────────────────────────────────────────
      DB_POOL_MAX_SIZE:            ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_IDLE:            ${DB_POOL_MIN_IDLE:-2}
      DB_POOL_LEAK_DETECTION_MS:   ${DB_POOL_LEAK_DETECTION_MS:-60000}

      # ── JWT ───────────────────────────────────────────────────────────────────
      # Generate: openssl rand -base64 32
      JWT_SECRET:               ${JWT_SECRET:?JWT_SECRET must be set in .env (openssl rand -base64 32)}
      JWT_EXPIRATION_MS:        ${JWT_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-86400000}

      # ── CORS ──────────────────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set in .env}

      # ── Flyway ────────────────────────────────────────────────────────────────
      # Set FLYWAY_BASELINE_ON_MIGRATE=true ONCE when adopting Flyway on an
      # existing database, then remove it. Default false for all new databases.
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}

    # No host port binding here — override.yml exposes ports for local dev.
    # In production, a reverse proxy (nginx, Traefik, ALB) forwards to the
    # container IP on the backend-net network.

    depends_on:
      postgres:
        condition: service_healthy    # Wait for PostgreSQL health check to pass

    networks:
      - backend-net

    # ── Security hardening ─────────────────────────────────────────────────────
    # These settings reduce the container's attack surface.
    # docker-compose.override.yml relaxes some of these for development
    # (e.g. read_only: false for live-reload).

    # read_only: mount the container's root filesystem read-only.
    # Prevents an attacker who achieves code execution from modifying system files.
    # /tmp is explicitly mounted as tmpfs (below) for Tomcat temp files.
    read_only: true

    tmpfs:
      # Tomcat writes temp files to /tmp. noexec prevents binary execution
      # from /tmp; nosuid prevents setuid abuse; 128m is generous for temp files.
      - /tmp:noexec,nosuid,size=128m,mode=1777

    cap_drop:
      # Drop ALL Linux capabilities. The Spring Boot app needs none of them.
      # Notable capabilities dropped: NET_BIND_SERVICE (would allow binding < 1024),
      # SYS_ADMIN, SYS_PTRACE, NET_RAW. The app runs on port 8080 (> 1024), so
      # NET_BIND_SERVICE is not needed.
      - ALL

    security_opt:
      # Prevent the process from acquiring new privileges via setuid/setgid.
      # Belt-and-suspenders with cap_drop: ALL.
      - no-new-privileges:true

    healthcheck:
      # wget is available in eclipse-temurin alpine. curl is not installed
      # by default; wget is smaller and already present.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval:     30s
      timeout:       5s
      retries:        3
      start_period:  45s   # JVM startup + Flyway migration time

    deploy:
      resources:
        limits:
          cpus:   "${APP_CPU_LIMIT:-2.0}"
          memory: "${APP_MEM_LIMIT:-512m}"

# =============================================================================
# Networks
# =============================================================================
networks:
  backend-net:
    driver: bridge
    ipam:
      driver: default
      config:
        # Explicit subnet prevents conflicts with other compose projects or VPNs.
        # Change this if 172.20.0.0/16 overlaps with your local network.
        - subnet: 172.20.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
    labels:
      # Labels enable volume identification by backup tools (e.g. duplicati,
      # restic docker plugins) and `docker volume ls --filter label=...`.
      com.foodorder.service:     postgres
      com.foodorder.environment: ${SPRING_PROFILES_ACTIVE:-prod}
      com.foodorder.description: PostgreSQL data directory